name: CD

on:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Dar permiso a mvnw
        run: chmod +x mvnw

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compilar jar
        run: ./mvnw clean package -DskipTests

      - name: Construir imagen Docker
        run: docker build -t mi-servicio:latest .